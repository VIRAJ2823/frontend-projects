<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ultimate Quiz App</title>

  <link rel="stylesheet" href="styles.css">

  <!-- Confetti -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
</head>
<body>

  <div class="theme-toggle">
    <button id="themeBtn">🌙</button>
  </div>

  <div class="container">

    <!-- HOME SCREEN -->
    <div class="card active" id="homeScreen">
      <h1>🎯 Ultimate Quiz App</h1>

      <input type="text" id="username" placeholder="Enter your name">

      <select id="category">
        <option value="9">📚 General Knowledge</option>
        <option value="18">💻 Computers</option>
        <option value="21">🏀 Sports</option>
        <option value="23">📜 History</option>
        <option value="17">🔬 Science</option>
      </select>

      <select id="difficulty">
        <option value="easy">🟢 Easy</option>
        <option value="medium">🟠 Medium</option>
        <option value="hard">🔴 Hard</option>
      </select>

      <button id="startBtn">Start Quiz</button>

      <button id="leaderboardBtn">🏆 Leaderboard</button>
    </div>

    <!-- LOADER -->
    <div class="card hidden" id="loader">
      <div class="spinner"></div>
      <p>Loading Questions...</p>
    </div>

    <!-- QUIZ SCREEN -->
    <div class="card hidden" id="quizScreen">

      <div class="quiz-header">
        <h2 id="questionCounter">Question 1/10</h2>
        <div id="score">Score: 0</div>
      </div>

      <h2 id="question">Question Text</h2>

      <div id="answers"></div>

      <button id="nextBtn" class="hidden">Next Question</button>
    </div>

    <!-- RESULT SCREEN -->
    <div class="card hidden" id="resultScreen">
      <h1>🎉 Quiz Completed!</h1>

      <h2 id="finalScore"></h2>

      <div class="result-buttons">
        <button id="restartBtn">Restart</button>
        <button id="shareBtn">Share Score</button>
      </div>
    </div>

    <!-- LEADERBOARD -->
    <div class="card hidden" id="leaderboardScreen">
      <h1>🏆 Leaderboard</h1>

      <ul id="leaderboardList"></ul>

      <button id="backBtn">Back</button>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
